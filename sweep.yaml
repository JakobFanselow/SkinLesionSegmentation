program: train.py
method: bayes 
metric:
  name: val_loss
  goal: minimize

early_terminate:
  type: hyperband
  min_iter: 6
  eta: 2

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-3
  max_learning_rate: 
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-2
  max_norm:
    values: [1.0, 2.0, 5.0, 10.0]
  batch_size:
    values: [4, 8, 16]
  model:
    values: ["UNET", "AUNET", "RESNET", "VNET"]
  weight_decay:
    values: [0.0001, 0.001, 0.01]
  dice_weight:
    distribution: uniform
    min: 0.3
    max: 0.7